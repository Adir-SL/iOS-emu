<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iOS Safari Tester</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Draggable titlebar region -->
  <div id="titlebar" data-tauri-drag-region></div>

  <div id="app">
    <!-- Control strip -->
    <div id="controls">
      <div id="address-row">
        <select id="device-select" title="Device"></select>
        <input id="url-input" type="url" placeholder="https://example.com" spellcheck="false" />
        <button id="go-btn" title="Go">▶</button>
        <button id="reload-btn" title="Reload">↺</button>
      </div>
      <div id="device-info"></div>

      <div id="toggles-section">
        <div class="toggles-label">iOS Bug Simulations</div>
        <div id="toggles-grid"></div>
      </div>
    </div>

    <!-- iPhone frame + webview area -->
    <div id="phone-wrapper">
      <div id="phone-frame">
        <!-- Dynamic Island / notch / forehead rendered by JS -->
        <div id="phone-topbar">
          <div id="island-notch"></div>
          <div id="status-bar">
            <span class="status-time">9:41</span>
            <div class="status-icons">
              <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="3" width="3" height="9" rx="0.5"/><rect x="4.5" y="2" width="3" height="10" rx="0.5"/><rect x="9" y="0.5" width="3" height="11.5" rx="0.5"/><rect x="13.5" y="0" width="2.5" height="12" rx="0.5" opacity="0.3"/></svg>
              <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.4C13.2 1.3 10.7 0 8 0 5.3 0 2.8 1.3 1 3.4L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z"/><path d="M8 5.5C9.5 5.5 10.8 6.1 11.8 7.1L13.2 5.6C11.8 4.1 9.9 3.2 8 3.2 6.1 3.2 4.2 4.1 2.8 5.6L4.2 7.1C5.2 6.1 6.5 5.5 8 5.5Z"/><circle cx="8" cy="10" r="1.5"/></svg>
              <svg width="25" height="12" viewBox="0 0 25 12" fill="currentColor"><rect x="0" y="1" width="21" height="10" rx="2" stroke="currentColor" stroke-width="1" fill="none"/><rect x="1.5" y="2.5" width="15" height="7" rx="1"/><path d="M22 4.5C23.1 4.5 24 5.2 24 6.5C24 7.8 23.1 8.5 22 8.5V4.5Z"/></svg>
            </div>
          </div>
        </div>

        <div id="webview-placeholder">
          <div id="webview-hint">
            <div class="hint-icon">🌐</div>
            <p>Enter a URL above and press Go</p>
          </div>
        </div>

        <div id="phone-bottombar">
          <div id="home-indicator"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
